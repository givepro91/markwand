<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" stroke-opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glow behind icon -->
  <circle cx="290" cy="315" r="280" fill="url(#glow)"/>

  <!-- App icon (scaled down version of build/icon.svg) -->
  <g transform="translate(290, 315) scale(0.25) translate(-512, -512)" filter="url(#iconShadow)">
    <rect x="32" y="32" width="960" height="960" rx="224" ry="224" fill="url(#iconGrad)"/>
    <g transform="translate(512, 512)" fill="#ffffff">
      <path d="M -280,-140
               L -280,140
               L -220,140
               L -220,-40
               L -130,80
               L -70,80
               L 20,-40
               L 20,140
               L 80,140
               L 80,-140
               L 20,-140
               L -100,20
               L -220,-140
               Z" />
      <path d="M 160,-140
               L 160,40
               L 110,40
               L 210,170
               L 310,40
               L 260,40
               L 260,-140
               Z" />
    </g>
  </g>

  <!-- Divider line -->
  <line x1="520" y1="160" x2="520" y2="470" stroke="#1e293b" stroke-width="2"/>

  <!-- Title -->
  <text x="570" y="260" font-size="108" font-weight="700" fill="#ffffff" letter-spacing="-3">Markwand</text>

  <!-- Korean subtitle -->
  <text x="572" y="325" font-size="40" font-weight="500" fill="#cbd5e1" letter-spacing="-0.5">AI 산출물 큐레이터</text>

  <!-- Tagline (Korean) -->
  <text x="572" y="380" font-size="26" font-weight="400" fill="#94a3b8">흩어진 마크다운 문서를 한 곳에서</text>

  <!-- Feature chips -->
  <g font-size="18" font-weight="500">
    <!-- chip 1 -->
    <rect x="572" y="420" width="138" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="641" y="444" fill="#e2e8f0" text-anchor="middle">📅 최근 7일</text>

    <!-- chip 2 -->
    <rect x="722" y="420" width="122" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="783" y="444" fill="#e2e8f0" text-anchor="middle">🏷 태그 필터</text>

    <!-- chip 3 -->
    <rect x="856" y="420" width="110" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="911" y="444" fill="#e2e8f0" text-anchor="middle">🔗 drift</text>

    <!-- chip 4 -->
    <rect x="978" y="420" width="120" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="1038" y="444" fill="#e2e8f0" text-anchor="middle">🌐 SSH</text>
  </g>

  <!-- Bottom meta row -->
  <g font-size="18" font-weight="500">
    <!-- Version badge -->
    <rect x="570" y="520" width="170" height="34" rx="6" fill="#1e40af" fill-opacity="0.25" stroke="#3B82F6" stroke-width="1"/>
    <text x="655" y="543" fill="#93c5fd" text-anchor="middle">v0.3.0-beta.7</text>

    <!-- License / OSS -->
    <text x="760" y="543" fill="#64748b">MIT · Open Source · macOS</text>
  </g>

  <!-- Bottom right: handle/URL -->
  <text x="1150" y="596" font-size="16" font-weight="400" fill="#475569" text-anchor="end">github.com/givepro91/markwand</text>
</svg>
